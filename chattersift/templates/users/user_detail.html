{% extends "base.html" %}

{% load static %}

{% block title %}
  User:
  {{ object.name }}
{% endblock title %}
{% block content %}
  <div class="space-y-6">
    <h2 class="text-2xl font-bold">{{ object.name }}</h2>
    {% if object == request.user %}
      <div class="flex flex-wrap gap-3">
        <a class="btn btn-primary btn-sm" href="{% url 'users:update' %}">My Info</a>
        <a class="btn btn-primary btn-sm" href="{% url 'account_email' %}">E-Mail</a>
        <a class="btn btn-primary btn-sm"
           href="{% url 'alerts:notification_settings' %}">Notifications</a>
        <a class="btn btn-primary btn-sm" href="{% url 'mfa_index' %}">MFA</a>
      </div>
    {% endif %}
  </div>
{% endblock content %}
