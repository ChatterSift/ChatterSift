{% extends "base.html" %}

{% load crispy_forms_tags %}

{% block title %}
  {{ user.name }}
{% endblock title %}
{% block content %}
  <h1 class="text-2xl font-bold mb-6">{{ user.name }}</h1>
  <form method="post" action="{% url 'users:update' %}">
    {% csrf_token %}
    {{ form|crispy }}
    <div class="mt-4">
      <button type="submit" class="btn btn-primary">Update</button>
    </div>
  </form>
{% endblock content %}
